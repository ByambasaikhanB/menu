<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menu</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="testimonial">
      <h2 class="testimonial__title">MENU</h2>
      <div class="testimonial__swiper container swiper">
        <div class="swiper-wrapper" id="menu-wrapper">
          <!-- JS-ээр динамик card үүснэ -->
        </div>

        <!-- pagination -->
        <div class="swiper-pagination"></div>

        <!-- navigation buttons -->
        <div class="swiper-button-prev"><i class="ri-arrow-left-line"></i></div>
        <div class="swiper-button-next">
          <i class="ri-arrow-right-line"></i>
        </div>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
