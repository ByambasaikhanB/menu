<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Menu</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <h2>Admin Menu</h2>
    <table id="menuTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>Sort</th>
          <th>Image</th>
          <th>Name</th>
          <th>Ingredients</th>
          <th>Price</th>
          <th>Kcal</th>
          <th>Icons</th>
          <th>Category</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <script src="/App.js"></script>
    <script>
      async function loadAdminMenu() {
        const tbody = document.querySelector("#menuTable tbody");
        try {
          const res = await fetch("/menu/food");
          if (!res.ok) throw new Error(await res.text());
          const data = await res.json();
          tbody.innerHTML = "";
          data
            .sort((a, b) => b.id - a.id)
            .forEach((item) => {
              const row = document.createElement("tr");
              row.innerHTML = `
        <td>${item.id}</td>
        <td contenteditable="true">${item.sort_order || 0}</td>
        <td>
          ${item.image_url ? `<img src="${item.image_url}" width="60"><br>` : "-"}
          <input type="file" class="imageInput" accept="image/*">
        </td>
        <td contenteditable="true">${item.name}</td>
        <td contenteditable="true">${item.ingredients || ""}</td>
        <td contenteditable="true">${item.price}</td>
        <td contenteditable="true">${item.kcal || ""}</td>
        <td contenteditable="true">${item.icons || ""}</td>
        <td contenteditable="true">${item.category}</td>
        <td>
          <button onclick="updateItem(${item.id}, this.closest('tr'))">Save</button>
          <button onclick="deleteItem(${item.id})">Delete</button>
        </td>
      `;
              tbody.appendChild(row);
            });
        } catch (err) {
          console.error(err);
        }
      }
      loadAdminMenu();
    </script>
  </body>
</html>
