<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Menu</title>
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <h2>Admin Menu</h2>
    <form id="menuForm" autocomplete="off" enctype="multipart/form-data">
      <input type="file" name="image" accept="image/*" required /><br />
      <img
        id="imagePreview"
        src=""
        style="
          display: none;
          width: 150px;
          border-radius: 12px;
          margin-bottom: 10px;
        "
      /><br />
      <input type="text" name="name" placeholder="Name" required /><br />
      <textarea name="ingredients" placeholder="Ingredients"></textarea><br />
      <input
        type="number"
        step="0.01"
        name="price"
        placeholder="Price"
        required
      /><br />
      <input type="number" name="kcal" placeholder="Kcal" /><br />
      <input type="text" name="icons" placeholder="Icons" /><br />
      <select name="category">
        <option value="">Select category</option>
        <option value="food">Food</option>
        <option value="cocktail">Cocktail</option>
        <option value="lunch">Lunch</option>
        <option value="dessert">Dessert</option></select
      ><br />
      <button type="submit">Add Item</button>
    </form>

    <h3>Existing Menu Items</h3>
    <table id="menuTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>Image</th>
          <th>Name</th>
          <th>Ingredients</th>
          <th>Price</th>
          <th>Kcal</th>
          <th>Icons</th>
          <th>Category</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <script src="admin.js"></script>
  </body>
</html>
