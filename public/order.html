<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Orders</title>
    <style>
      body {
        font-family: Arial;
        background: #111;
        color: white;
        padding: 20px;
      }
      .order {
        background: #222;
        padding: 15px;
        margin-bottom: 20px;
        border-radius: 10px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
      }
      th,
      td {
        border: 1px solid #444;
        padding: 8px;
        text-align: left;
      }
      th {
        background: #333;
      }
      img {
        width: 50px;
        height: 50px;
        object-fit: cover;
        border-radius: 5px;
      }
      button {
        padding: 6px 12px;
        background: green;
        border: none;
        color: white;
        cursor: pointer;
        border-radius: 5px;
      }
      .timer {
        font-style: italic;
        color: #0f0;
      }
    </style>
  </head>
  <body>
    <h1>Orders</h1>
    <div id="orders"></div>
    <script>
      async function loadOrders() {
        try {
          const res = await fetch("/orders");
          const data = await res.json();
          const div = document.getElementById("orders");
          div.innerHTML = "";
          // Filter DONE orders
          data
            .filter((order) => order.status !== "done")
            .forEach((order) => {
              const orderDiv = document.createElement("div");
              orderDiv.className = "order";
              let html = `
              <h3>Table: ${order.table_number}</h3>
              <p>Status: ${order.status}</p>
              <p>Ordered at: ${new Date(order.created_at).toLocaleString()}</p>
              <p class="timer" id="timer-${order.id}">Elapsed: 0s</p>
              <table>
                <thead><tr><th>Image</th><th>Name</th><th>Price</th></tr></thead>
                <tbody>`;
              order.items.forEach((item) => {
                html += `<tr>
                <td>${item.image_url ? `<img src="${item.image_url}">` : "-"}</td>
                <td>${item.name}</td>
                <td>${item.price}₮</td>
              </tr>`;
              });
              html += `</tbody></table>
              <p><strong>Total: ${order.total_price}₮</strong></p>
              <button onclick="markDone(${order.id})">DONE</button>`;
              orderDiv.innerHTML = html;
              div.appendChild(orderDiv);

              // TIMER
              const startTime = new Date(order.created_at).getTime();
              const timerEl = document.getElementById(`timer-${order.id}`);
              setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const min = Math.floor(elapsed / 60);
                const sec = elapsed % 60;
                timerEl.innerText = `Elapsed: ${min}m ${sec}s`;
              }, 1000);
            });
        } catch (err) {
          console.error(err);
        }
      }

      async function markDone(id) {
        await fetch("/orders/" + id, { method: "PUT" });
        loadOrders(); // DONE болгоход remove
      }

      loadOrders();
      setInterval(loadOrders, 5000);
    </script>
  </body>
</html>
