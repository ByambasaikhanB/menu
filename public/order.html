<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />

    <title>Barmen Orders</title>

    <style>
      body {
        background: #111;
        color: white;
        font-family: Arial;
        padding: 40px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        border: 1px solid #444;
        padding: 10px;
        text-align: center;
      }

      button {
        padding: 6px 12px;
      }
    </style>
  </head>

  <body>
    <h1>Barmen Orders</h1>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Table</th>
          <th>Items</th>
          <th>Total</th>
          <th>Status</th>
          <th>Done</th>
        </tr>
      </thead>

      <tbody id="ordersTable"></tbody>
    </table>

    <script>
      async function loadOrders() {
        const res = await fetch("/orders");

        const data = await res.json();

        const table = document.getElementById("ordersTable");

        table.innerHTML = "";

        data.forEach((o) => {
          const row = document.createElement("tr");

          row.innerHTML = `

<td>${o.id}</td>

<td>${o.table_number}</td>

<td>${o.items.map((i) => i.name).join(", ")}</td>

<td>${o.total_price}₮</td>

<td>${o.status}</td>

<td>

<button onclick="done(${o.id})">

Done

</button>

</td>

`;

          table.appendChild(row);
        });
      }

      async function done(id) {
        await fetch("/orders/" + id, { method: "PUT" });

        loadOrders();
      }

      loadOrders();

      setInterval(loadOrders, 3000);
    </script>
  </body>
</html>
