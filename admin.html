<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Menu</title>
  </head>
  <body>
    <h2>Admin Menu</h2>
    <form id="menuForm">
      <input
        type="text"
        name="image_url"
        placeholder="Image URL"
        required
      /><br />
      <input type="text" name="name" placeholder="Name" required /><br />
      <textarea name="ingredients" placeholder="Ingredients" required></textarea
      ><br />
      <input
        type="number"
        step="0.01"
        name="price"
        placeholder="Price"
        required
      /><br />
      <input type="number" name="kcal" placeholder="Kcal" required /><br />
      <input type="text" name="icons" placeholder="Icons" /><br />
      <button type="submit">Add Item</button>
    </form>
    <script src="app.js"></script>
  </body>
</html>
